<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript">
    (function() {
      const params = new URLSearchParams(window.location.search);
      let state = params.get('state');                    // from Microsoft OAuth

      // If no state, fall back to pathname
      if (!state) {
        const segments = window.location.pathname.split('/').filter(Boolean);
        state = segments.length > 0 ? segments.join('/') : '';
      }

      if (state) {
        // Split state by / so first part becomes subdomain
        const parts = state.split('/').filter(Boolean);
        const subdomain = parts.shift();                  // first segment = subdomain
        const restPath = parts.join('/');                 // everything else = path

        let finalUrl = `https://${subdomain}.itrimex.de`;
        if (restPath) finalUrl += `/${restPath}`;

        window.location.replace(finalUrl);
      } else {
        window.location.replace("https://itrimex.de/");
      }
    })();
  </script>
  
  <meta http-equiv="refresh" content="2; url=https://itrimex.de/">
</head>
<body>Redirecting...</body>
</html>
