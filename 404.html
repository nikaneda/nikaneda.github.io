<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      (function() {
        var segments = window.location.pathname.split('/').filter(Boolean);
        
        if (segments.length > 0) {
          var firstPath = segments.shift();           // becomes the subdomain
          var rest = segments.join('/');              // everything after it
          
          var finalUrl = "https://" + firstPath + ".itrimex.de";
          if (rest) finalUrl += "/" + rest;
          
          window.location.replace(finalUrl);
        } else {
          window.location.replace("https://itrimex.de/");
        }
      })();
    </script>
    
    <!-- Fallback in case JS is blocked -->
    <meta http-equiv="refresh" content="0; url=https://itrimex.de/">
</head>
<body>
    <p>If you are not redirected, <a href="https://itrimex.de/">click here</a>.</p>
</body>
</html>
